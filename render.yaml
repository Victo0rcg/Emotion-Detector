services:
  - type: web
    name: emotioncam-web
    runtime: python
    plan: standard
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --threads 2 --timeout 180 --worker-class gthread app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.11
      - key: TF_CPP_MIN_LOG_LEVEL
        value: "2"
