<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>EmotionCam Web</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"
    >
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand navbar-dark bg-primary">
        <div class="container app-container">
            <span class="navbar-brand mb-0 h1 fs-5">EmotionCam</span>
            <div class="navbar-nav ms-auto flex-row gap-2">
                <a class="nav-link px-2" href="{{ url_for('index') }}">Home</a>
                <a class="nav-link px-2" href="/history">History</a>
                <a class="nav-link px-2" href="/stats">Statistics</a>
            </div>
        </div>
    </nav>

    <main class="container app-container py-4">
        <header class="text-center mb-4">
            <h1 class="display-6 fw-bold mb-2">EmotionCam Web</h1>
            <p class="text-muted mb-0">Detect emotions from your camera photo</p>
        </header>

        <section class="card shadow-sm border-0 mb-4" aria-label="Camera preview">
            <div class="card-body p-3">
                <h2 class="h6 text-muted text-uppercase mb-3">Camera Preview</h2>
                <div class="camera-preview-wrap ratio ratio-4x3 rounded">
                    <video
                        id="camera-preview"
                        class="camera-preview"
                        autoplay
                        playsinline
                        muted
                        aria-label="Live camera preview"
                    ></video>
                </div>
                <p id="camera-status" class="camera-status small text-muted text-center mt-3 mb-0" role="status"></p>
            </div>
        </section>

        <section
            id="captured-section"
            class="card shadow-sm border-0 mb-4"
            aria-label="Captured photo"
            hidden
        >
            <div class="card-body p-3">
                <h2 class="h6 text-muted text-uppercase mb-3">Captured Photo</h2>
                <div class="captured-preview-wrap ratio ratio-4x3 rounded">
                    <canvas
                        id="capture-canvas"
                        class="capture-canvas"
                        aria-label="Captured photo preview"
                    ></canvas>
                </div>
            </div>
        </section>

        <section class="d-grid gap-2 mb-4" aria-label="Actions">
            <button type="button" id="capture-btn" class="btn btn-primary btn-lg" disabled>
                Capture
            </button>
            <button type="button" id="upload-btn" class="btn btn-outline-primary btn-lg" disabled>
                Upload
            </button>
            <button type="button" id="analyze-btn" class="btn btn-success btn-lg" disabled>
                Analyze
            </button>
        </section>

        <section class="card shadow-sm border-0 mb-4" aria-label="Emotion result">
            <div class="card-body">
                <h2 class="h6 text-muted text-uppercase mb-3">Emotion Result</h2>

                <div id="result-error" class="alert alert-danger d-none mb-0" role="alert"></div>

                <div id="result-empty" class="result-placeholder rounded p-4 text-center">
                    <p class="mb-0 text-muted">
                        Result will appear here after analysis
                    </p>
                </div>

                <div id="result-success" class="d-none text-center">
                    <span id="emotion-badge" class="badge text-bg-primary fs-5 mb-3"></span>
                    <p id="emotion-label" class="display-6 fw-semibold text-capitalize mb-3"></p>
                    <p class="small text-muted text-uppercase mb-2">Confidence</p>
                    <div class="progress mb-2" style="height: 1.25rem;">
                        <div
                            id="confidence-bar"
                            class="progress-bar progress-bar-striped"
                            role="progressbar"
                            aria-valuemin="0"
                            aria-valuemax="100"
                        ></div>
                    </div>
                    <p class="mb-0 fs-5 fw-semibold">
                        <span id="emotion-confidence">0</span>%
                    </p>
                </div>
            </div>
        </section>
    </main>

    <script src="{{ url_for('static', filename='js/camera.js') }}"></script>
</body>
</html>
